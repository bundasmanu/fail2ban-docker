apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Release.Name }}-fail2ban-jail
  labels:
    app.kubernetes.io/name: fail2ban
    app.kubernetes.io/instance: {{ .Release.Name }}
data:
  fail2ban-jail.local: |
{{ .Files.Get "config/jail.d/fail2ban-jail.local" | indent 4 }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Release.Name }}-fail2ban-filter
  labels:
    app.kubernetes.io/name: fail2ban
    app.kubernetes.io/instance: {{ .Release.Name }}
data:
  custom-ban.conf: |
{{ .Files.Get "config/filter.d/custom-ban.conf" | indent 4 }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Release.Name }}-fail2ban-main
  labels:
    app.kubernetes.io/name: fail2ban
    app.kubernetes.io/instance: {{ .Release.Name }}
data:
  fail2ban.local: |
{{ .Files.Get "config/fail2ban.local" | indent 4 }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Release.Name }}-fail2ban-cron
  labels:
    app.kubernetes.io/name: fail2ban
    app.kubernetes.io/instance: {{ .Release.Name }}
data:
  reload-fail2ban: |
{{ .Files.Get "config/cron-reload/reload-fail2ban" | indent 4 }}
