name: Helm Install test

on:
  push:
    branches: [main]
    tags: ['*']
    paths:
      - 'k8s/**'
  pull_request:
    branches: [main]
    paths:
      - 'k8s/**'

jobs:
  lint-and-template:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: 'v3.16.0'

      - name: Lint chart
        run: helm lint ./k8s/helm/fail2ban

      - name: Template (dry-run)
        run: |
          helm template fail2ban ./k8s/helm/fail2ban --namespace fail2ban --create-namespace > /dev/null
          echo "Chart renders successfully"

  install-on-kind:
    runs-on: ubuntu-latest
    needs: lint-and-template
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: 'v3.16.0'

      - name: Create kind cluster
        uses: helm/kind-action@v1.10.0
        with:
          cluster_name: fail2ban-test
          # Fail2Ban needs privileged + NET_ADMIN; kind nodes allow this by default

      - name: Install chart
        run: |
          helm install fail2ban ./k8s/helm/fail2ban \
            --namespace fail2ban \
            --create-namespace
          # No --wait: DaemonSet uses hostNetwork/privileged; pods may not become Ready in kind

      - name: Verify release and resources
        run: |
          helm list -n fail2ban
          kubectl get daemonset -n fail2ban
          kubectl get configmap -n fail2ban
          kubectl get pods -n fail2ban
